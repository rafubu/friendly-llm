[project]
name = "litert-connector"
version = "0.1.0"
description = "WebRTC connector for LiteRT-Ollama PC Gamer nodes"
requires-python = ">=3.11"
dependencies = [
    "litert-ollama>=0.1.0",
    "aiortc>=1.9.0",
    "aiohttp>=3.9.0",
    "websockets>=12.0",
]

[project.scripts]
litert-ollama-connect = "litert_connector.cli:main"

[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"
