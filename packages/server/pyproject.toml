[project]
name = "litert-ollama"
version = "0.1.0"
description = "Ollama-compatible local LLM server using LiteRT-LM"
requires-python = ">=3.11"
dependencies = [
    "litert-lm>=0.13.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "typer>=0.25.0",
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "huggingface-hub>=0.24.0",
    "python-multipart>=0.0.9",
    "aiosqlite>=0.20.0",
]

[project.optional-dependencies]
gamer = [
    "aiortc>=1.9.0",
    "aiohttp>=3.9.0",
    "websockets>=12.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-httpx>=0.30.0",
    "ruff>=0.4.0",
    "black>=24.0.0",
]

[project.scripts]
litert-ollama = "litert_ollama.cli:main"

[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"
