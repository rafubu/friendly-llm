[tool.pyproject]
name = "litert-ollama-workspace"
version = "0.1.0"
description = "Ollama-compatible server using LiteRT-LM for Gemma 4, with P2P WebRTC relay and multi-node support"
requires-python = ">=3.11"

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
